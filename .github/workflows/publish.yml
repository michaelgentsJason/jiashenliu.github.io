on:
  push:
    branches: main

name: Deploy Site

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto blog
        run: quarto render blog

      - name: Assemble full deployment directory
        run: |
          mkdir -p _deploy/blog

          # ── Main academic site (root-level static files) ──
          cp index.html publications.html styles.css script.js _deploy/
          cp -r assets _deploy/assets
          touch _deploy/.nojekyll

          # ── Blog (Quarto output → /blog subdirectory) ──
          cp -r blog/docs/. _deploy/blog/

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: _deploy
          clean: true
          single-commit: true
